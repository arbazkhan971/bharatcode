name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser needs the full history and all tags to build release notes.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope on arbazkhan971/homebrew-tap so GoReleaser can
          # push the generated Homebrew formula to the tap repository.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Publish the npm launcher package after the GitHub release exists: the package
  # is a thin shim whose postinstall downloads the binary for tag v<version> from
  # GitHub Releases, so the release assets must be present before npm publishes.
  # The npm version is kept in sync with the tag in npm/package.json at bump time.
  #
  # Auth is npm Trusted Publishing (OIDC): GitHub Actions proves its identity to
  # the npm registry via a short-lived OIDC token, so NO npm token is created,
  # stored, or rotated. A one-time link in the npm package settings (Trusted
  # Publisher -> this repo + this workflow) authorizes it. The id-token:write
  # permission below is what lets the runner mint that OIDC token.
  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing / OIDC needs npm >= 11.5.1; the Node 22 runner ships an
      # older npm, so upgrade to the latest before publishing.
      - name: Upgrade npm to an OIDC-capable version
        run: npm install -g npm@latest

      - name: Verify package version matches the tag
        working-directory: npm
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::npm/package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing bharatcode-cli@$PKG_VERSION"

      # No NODE_AUTH_TOKEN: OIDC handles auth. --provenance attaches a signed
      # build-provenance attestation linking the package to this workflow run.
      - name: Publish to npm (Trusted Publishing / OIDC)
        working-directory: npm
        run: npm publish --access public --provenance
