name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser needs the full history and all tags to build release notes.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope on arbazkhan971/homebrew-tap so GoReleaser can
          # push the generated Homebrew formula to the tap repository.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Publish the npm launcher package after the GitHub release exists: the package
  # is a thin shim whose postinstall downloads the binary for tag v<version> from
  # GitHub Releases, so the release assets must be present before npm publishes.
  # The npm version is kept in sync with the tag in npm/package.json at bump time.
  #
  # Auth is the NPM_TOKEN repository secret — a granular access token (read+write
  # on bharatcode-cli, "bypass 2FA" enabled) that the package's publish policy
  # requires. setup-node's registry-url writes an .npmrc that reads the token from
  # NODE_AUTH_TOKEN, so the publish step only needs to set that env var. (OIDC /
  # Trusted Publishing was tried first but the registry rejected it for this
  # already-token-published package; the stored token is the reliable path.)
  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package version matches the tag
        working-directory: npm
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::npm/package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing bharatcode-cli@$PKG_VERSION"

      # NODE_AUTH_TOKEN authenticates the publish via the .npmrc setup-node wrote.
      # No --provenance: a signed build-provenance attestation requires the OIDC
      # id-token, which this token-auth path does not mint.
      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
