# GoReleaser configuration for BharatCode.
# Builds static, CGO-free binaries for linux, darwin, and windows on amd64 and
# arm64, packages them into archives, and emits a checksums file plus generated
# release notes.
#
# Validate locally with: goreleaser check
version: 2

project_name: bharatcode

before:
  hooks:
    - go mod tidy

builds:
  - id: bharatcode
    binary: bharatcode
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/arbazkhan971/bharatcode/internal/cmd.version={{ .Version }}
      - -X github.com/arbazkhan971/bharatcode/internal/cmd.commit={{ .Commit }}

archives:
  - id: bharatcode
    ids:
      - bharatcode
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    # Windows users prefer zip archives.
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

brews:
  - name: bharatcode
    ids:
      - bharatcode
    repository:
      owner: arbazkhan971
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/arbazkhan971/bharatcode"
    description: "BharatCode — an open, sovereign terminal coding agent"
    license: "MIT"
    install: |
      bin.install "bharatcode"
    test: |
      system "#{bin}/bharatcode", "version"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
